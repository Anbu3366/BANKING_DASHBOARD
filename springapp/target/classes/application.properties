# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/banking_dashboard
spring.datasource.username=bankuser
spring.datasource.password=bankpass123

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8080

# Basic Auth (enable/disable)
app.security.basic.enabled=true
app.security.username=bankuser
app.security.password=bankpass
